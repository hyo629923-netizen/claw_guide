<div class="card">
  <div class="step">
    <div class="num">1</div>
    <div class="content">
      <h2>建立 Felo API Key</h2>
      <p>前往 Felo 官網，依照下方畫面建立 API Key。如果不需要 Felo，可以跳過此步驟。</p>
      <div class="image-group">
        <p style="font-size:14px; font-weight:600; color:var(--muted);">開啟 Felo 設定</p>
        <img class="figure" src="assets/tool/create-felo-api-key-1.png" alt="開啟 Felo 設定">
        
        <p style="font-size:14px; font-weight:600; color:var(--muted);">進入 API Keys</p>
        <img class="figure" src="assets/tool/create-felo-api-key-2.png" alt="進入 API Keys">

        <p style="font-size:14px; font-weight:600; color:var(--muted);">新建 API Key</p>
        <img class="figure" src="assets/tool/create-felo-api-key-3.png" alt="新建 API Key">

        <p style="font-size:14px; font-weight:600; color:var(--muted);">輸入 Key 名稱</p>
        <img class="figure" src="assets/tool/create-felo-api-key-4.png" alt="Key 名稱">

        <p style="font-size:14px; font-weight:600; color:var(--muted);">複製 API Key</p>
        <img class="figure" src="assets/tool/create-felo-api-key-5.png" alt="複製 Token">
      </div>
    </div>
  </div>
</div>

<div class="card">

      <div class="image-group">
        <p style="font-size:14px; font-weight:600; color:var(--muted);">開啟 Gemini API Keys</p>
        <img class="figure" src="assets/tool/create-gemini-api-key-1.png" alt="AI Studio">
        
        <p style="font-size:14px; font-weight:600; color:var(--muted);">建立新 Key</p>
        <img class="figure" src="assets/tool/create-gemini-api-key-2.png" alt="Create Key">

        <p style="font-size:14px; font-weight:600; color:var(--muted);">複製 API Key</p>
        <img class="figure" src="assets/tool/create-gemini-api-key-3.png" alt="Copy Key">
