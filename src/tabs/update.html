<div class="card">
  <div style="display: flex; flex-direction: column; gap: 32px;">
    <!-- Demo Image Moved to TOP -->
    <div class="image-group" style="padding: 0; border: none; margin: 0;">
      <img src="assets/update/update-demo.png" class="figure" alt="Update Demo" style="width: 100%; max-width: 500px; border-radius: 12px; margin: 0 auto; display: block; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
    </div>

    <hr style="border: none; border-top: 1px solid var(--border); margin: 0;">

    <!-- Step 1 -->
    <div class="step">
      <div class="num">1</div>
      <div>
        <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 800; color: var(--card-title);">開啟 Telegram</h2>
        <p style="margin: 0; line-height: 1.6; opacity: 0.9;">打開 Telegram App，進入你與小龍蝦機器人的對話視窗。</p>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="step">
      <div class="num">2</div>
      <div>
        <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 800; color: var(--card-title);">執行強制更新</h2>
        <p style="margin: 0 0 12px; line-height: 1.6; opacity: 0.9;">輸入下列指令來觸發核心引擎的自動更新：</p>
        <code style="display: block; padding: 14px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 14px;">/auto-update force: true</code>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="step">
      <div class="num">3</div>
      <div>
        <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 800; color: var(--card-title);">建立全新大腦</h2>
        <p style="margin: 0 0 12px; line-height: 1.6; opacity: 0.9;">輸入下列指令以建立新的環境，確保獲得最新的提示詞與工作流程腳本：</p>
        <code style="display: block; padding: 14px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 14px;">/new</code>
      </div>
    </div>
  </div>
</div>
